name: Sync production with main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync production branch to main
        run: |
          git fetch origin
          if ! git rev-parse --verify origin/production >/dev/null 2>&1; then
            echo "production branch not found on origin; skipping sync."
            exit 0
          fi
          git checkout production
          git reset --hard origin/main
          git push origin production --force-with-lease
