name: Deploy Modal compute backend

# Auto-deploys the fluigi compute service to Modal whenever the backend
# definition changes on the production branch.
on:
  push:
    branches: [production]
    paths:
      - modal_app.py
      - .github/workflows/deploy-modal.yml
  # Allow manual redeploys from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal_app.py
