name: Deploy Modal compute backend

# Auto-deploys the fluigi compute service to Modal whenever the backend
# definition changes on main. (Triggers on the dev branch directly: a
# bot-synced push to production would not trigger Actions.)
on:
  push:
    branches: [main]
    paths:
      - modal_app.py
      - .github/workflows/deploy-modal.yml
  # Allow manual redeploys from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        # fastapi/uvicorn are imported at module level in modal_app.py,
        # so `modal deploy` needs them present in the runner too.
        run: pip install modal fastapi uvicorn

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal_app.py
